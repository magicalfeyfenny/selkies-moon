name: Ornate UI visual tour

on:
  push:
    branches:
      - codex/ornate-ui-visual-tour-ci
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Full 40-character candidate commit SHA to build and capture
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ornate-ui-visual-tour-${{ github.workflow }}-${{ inputs.candidate_sha || 'acdf8e529ffe68e38fb87580c73ca5cee2286f6d' }}
  cancel-in-progress: false

jobs:
  visual-tour:
    name: Capture ornate UI tour
    runs-on: windows-2022
    timeout-minutes: 35
    env:
      CANDIDATE_SHA: ${{ inputs.candidate_sha || 'acdf8e529ffe68e38fb87580c73ca5cee2286f6d' }}
      WORKFLOW_SHA: ${{ github.sha }}

    steps:
      - name: Require a full candidate commit SHA
        shell: pwsh
        run: |
          if ($env:CANDIDATE_SHA -notmatch '^[0-9a-fA-F]{40}$') {
            throw 'candidate_sha must be a full 40-character hexadecimal commit SHA.'
          }

      - name: Check out CI tooling
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.sha }}
          path: ci-tooling
          persist-credentials: false

      - name: Check out exact candidate source
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.CANDIDATE_SHA }}
          path: candidate
          fetch-depth: 1
          persist-credentials: false

      - name: Verify candidate and workflow identities
        id: identity
        shell: pwsh
        run: |
          $expectedCandidate = $env:CANDIDATE_SHA.ToLowerInvariant()
          $actualCandidate = (git -C candidate rev-parse HEAD).Trim().ToLowerInvariant()
          $actualWorkflow = (git -C ci-tooling rev-parse HEAD).Trim().ToLowerInvariant()
          $expectedWorkflow = $env:WORKFLOW_SHA.ToLowerInvariant()

          Write-Host "Candidate SHA: $actualCandidate"
          Write-Host "Workflow SHA: $actualWorkflow"

          if ($actualCandidate -ne $expectedCandidate) {
            throw "Candidate checkout mismatch: expected $expectedCandidate, got $actualCandidate."
          }
          if ($actualWorkflow -ne $expectedWorkflow) {
            throw "Workflow checkout mismatch: expected $expectedWorkflow, got $actualWorkflow."
          }

          "candidate_sha=$actualCandidate" >> $env:GITHUB_OUTPUT
          "workflow_sha=$actualWorkflow" >> $env:GITHUB_OUTPUT

      - name: Require GameMaker CI access key
        shell: pwsh
        env:
          ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ACCESS_KEY)) {
            throw 'Add the GameMaker access key as the repository Actions secret ACCESS_KEY.'
          }

      - name: Set up GameMaker Igor
        id: igor
        uses: bscotch/igor-setup@b7126413204dfd85b2e26c6276940ee78d70cb29
        with:
          access-key: ${{ secrets.ACCESS_KEY }}
          runtime-version: 2026.0.0.23
          modules: windows
          cache: true

      - name: Prepare space-safe GameMaker user directory
        id: game_maker_user
        shell: pwsh
        env:
          SOURCE_USER_DIR: ${{ steps.igor.outputs.user-dir }}
        run: |
          $safeUserDirectory = Join-Path $env:RUNNER_TEMP 'gm-user'
          New-Item -ItemType Directory -Force -Path $safeUserDirectory | Out-Null
          Get-ChildItem -LiteralPath $env:SOURCE_USER_DIR -Force | ForEach-Object {
            Copy-Item -LiteralPath $_.FullName `
              -Destination $safeUserDirectory `
              -Recurse `
              -Force
          }
          "path=$safeUserDirectory" >> $env:GITHUB_OUTPUT

      - name: Build Windows VM visual-tour runner
        id: build
        uses: bscotch/igor-build@v1.3.3
        with:
          user-dir: ${{ steps.game_maker_user.outputs.path }}
          yyp-path: ${{ github.workspace }}\candidate\Selkie's Moon ~ until we meet again ~\Selkies Moon.yyp
          platform: windows
          config: Default
          yyc: false
          name: SelkiesMoonVisualTour.zip
          save-logs: true

      - name: Run visual tour and collect required captures
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\ci-tooling\tools\run_visual_tour_ci.ps1" `
            -RepositoryRoot "$env:GITHUB_WORKSPACE\candidate" `
            -BuildDirectory '${{ steps.build.outputs.out-dir }}' `
            -BuildName '${{ steps.build.outputs.out-name }}' `
            -CandidateSha '${{ steps.identity.outputs.candidate_sha }}' `
            -WorkflowSha '${{ steps.identity.outputs.workflow_sha }}'

      - name: Upload required visual-tour captures
        if: success()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ornate-ui-visual-tour-captures-${{ steps.identity.outputs.candidate_sha }}
          path: candidate/test-results/visual-tour-ci/captures/*.png
          if-no-files-found: error
          retention-days: 14

      - name: Upload visual-tour evidence and build logs
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ornate-ui-visual-tour-evidence-${{ steps.identity.outputs.candidate_sha }}
          path: |
            candidate/test-results/visual-tour-ci/logs/
            candidate/test-results/visual-tour-ci/visual-tour-manifest.json
            ${{ steps.build.outputs.log-dir }}
          if-no-files-found: warn
          retention-days: 14
